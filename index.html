<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taftalidze Security Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.6);
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-red: #ef4444;
            --accent-green: #22c55e;
            --accent-cyan: #06b6d4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: #1e293b;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        h2 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .hidden {
            display: none !important;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-cyan);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--accent-cyan);
            color: #0f172a;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
        }

        .btn-danger {
            background: transparent;
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            margin-top: 15px;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        /* Dashboard Top Layout Layout */
        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        #audio-toggle-btn {
            width: auto;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 20px;
        }

        /* Activity Stream Cards Layout */
        .log-list {
            max-height: 340px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .log-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 14px 16px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }

        .log-title {
            font-size: 14px;
            font-weight: 500;
        }

        .log-time {
            font-size: 13px;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-form">
            <h2>ACTIVITY STREAM AUTH</h2>
            <div class="form-group">
                <label>Operator Email</label>
                <input type="email" id="email" placeholder="operator@secure.io">
            </div>
            <div class="form-group">
                <label>Security Phrase</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" onclick="login()">Authenticate Console</button>
        </div>

        <div id="dashboard" class="hidden">
            <div class="dash-header">
                <h2>ACTIVITY STREAM</h2>
                <div class="header-actions">
                    <button id="audio-toggle-btn" class="btn btn-secondary" onclick="toggleDashboardAudio()">
                        🔈 Audio Disabled
                    </button>
                </div>
            </div>

            <div id="log-container" class="log-list"></div>

            <button class="btn btn-danger" onclick="triggerRemoteRestart()">
                Execute Remote ESP32 Restart
            </button>
        </div>
    </div>

    <script>
        // --- 1. SUPABASE ACCREDITATION CREDENTIALS ---
        const SUPABASE_PROJECT_ID = "nlnininesnenehyoshjw";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sbmluaW5lc25lbmVoeW9zaGp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NTAwMjUsImV4cCI6MjA5NzQyNjAyNX0.01yLEIL2-IoOV401Tw_7f5jEvoUocTOguQSPYazxVGk";
        
        const _supabase = supabase.createClient(
            `https://${SUPABASE_PROJECT_ID}.supabase.co`, 
            SUPABASE_ANON_KEY
        );

        // --- 2. MULTIMEDIA ENGINE INITIALIZATION ---
        const alertSound = new Audio("https://raw.githubusercontent.com/skype-web-sdk/skype-web-sdk-samples/master/audio/incoming.mp3");
        let isAudioMuted = true;

        // --- 3. SECURITY AUTHENTICATION HANDLERS ---
        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if(!email || !password) return alert("Please enter all authorization credentials.");

            try {
                const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
                if (error) {
                    alert("Authorization Terminated: " + error.message);
                } else {
                    showDashboard();
                }
            } catch(err) {
                alert("Connection handshake failed.");
            }
        }

        function showDashboard() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            fetchLogs();
            subscribeToLiveUpdates();
        }

        // --- 4. DATA RETRIEVAL & RENDERING PIPELINES ---
        async function fetchLogs() {
            try {
                const { data: logs, error } = await _supabase
                    .from('logs')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(5);

                if (error) throw error;
                renderLogs(logs);
            } catch (err) {
                console.error("Error drawing log data panel:", err.message);
            }
        }

        function renderLogs(logs) {
            const container = document.getElementById('log-container');
            if (!logs || logs.length === 0) {
                container.innerHTML = `<p style="color:var(--text-muted); text-align:center; font-size:14px; margin:40px 0;">No intrusion events logged.</p>`;
                return;
            }

            container.innerHTML = logs.map(log => {
                const dateObj = new Date(log.created_at);
                const displayDate = dateObj.toLocaleDateString([], { day: '2-digit', month: '2-digit' });
                const displayTime = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });

                return `
                    <div class="log-card">
                        <div class="log-title">
                            <span style="color:var(--accent-red); margin-right: 6px;">●</span> Motion Detected
                        </div>
                        <div class="log-time">${displayDate} @ ${displayTime}</div>
                    </div>
                `;
            }).join('');
        }

        // --- 5. AUDIO GATEWAY PERSISTENCE CONTROLLERS ---
        function toggleDashboardAudio() {
            const btn = document.getElementById('audio-toggle-btn');
            
            if (isAudioMuted) {
                // Interactive trigger handshake to explicitly satisfy browser autoplay requirements
                alertSound.play()
                    .then(() => {
                        alertSound.pause();
                        alertSound.currentTime = 0;
                        
                        isAudioMuted = false;
                        btn.innerHTML = "🔊 Audio Active";
                        btn.style.borderColor = "var(--accent-green)";
                        btn.style.color = "var(--accent-green)";
                        console.log("Web Audio Context initialized and verified.");
                    })
                    .catch((err) => {
                        console.error("Audio initialization sequence blocked by host:", err.message);
                    });
            } else {
                isAudioMuted = true;
                btn.innerHTML = "🔈 Audio Disabled";
                btn.style.borderColor = "var(--border-color)";
                btn.style.color = "var(--text-muted)";
            }
        }

        // --- 6. REAL-TIME REALM EVENT SYNCHRONIZATION ---
        function subscribeToLiveUpdates() {
            console.log("Initializing real-time monitoring connection...");

            _supabase
                .channel('schema-db-changes')
                .on(
                    'postgres_changes', 
                    { event: 'INSERT', schema: 'public', table: 'logs' }, 
                    (payload) => {
                        console.log("Live motion event captured!", payload.new);
                        
                        // Multimedia playback layer processing
                        if (!isAudioMuted && alertSound) {
                            try {
                                alertSound.currentTime = 0;
                                const playPromise = alertSound.play();
                                if (playPromise !== undefined) {
                                    playPromise.catch((e) => console.warn("Audio stream output deferred:", e.message));
                                }
                            } catch (err) {
                                console.warn("System multimedia device context busy:", err.message);
                            }
                        }
                        
                        // Force a smooth visual list update loop
                        fetchLogs(); 
                    }
                )
                .subscribe((status) => {
                    console.log("Subscription network channel sync:", status);
                });
        }

        // --- 7. REMOTE REMOTING PROTOCOLS ---
        async function triggerRemoteRestart() {
            if (!confirm("Confirm immediate remote firmware hardware execution restart for ESP32?")) return;

            try {
                const { error } = await _supabase
                    .from('command')
                    .insert([{ command: 'RESTART', processed: false }]);

                if (error) throw error;
                alert("Execution sequence successfully queued into database pipeline. Unit will acknowledge within 10 seconds.");
            } catch (err) {
                alert("Failed to push execution instructions line: " + err.message);
            }
        }
    </script>
</body>
</html>
