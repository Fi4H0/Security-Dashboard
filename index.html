<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taftalidze Security Hub - Grafana Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --grafana-bg: #0b0c10;
            --grafana-panel: #141619;
            --grafana-card: #1f2226;
            --grafana-border: #2c323a;
            --text-main: #d8d9da;
            --text-muted: #7b8087;
            
            /* Grafana Vibrant Accent Palette */
            --orange-accent: #ff780a;
            --green-accent: #56a64b;
            --blue-accent: #5794f2;
            --red-accent: #f2495c;
            
            --font-mono: "Fira Code", Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--grafana-bg);
            color: var(--text-main);
            min-height: 100vh;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dashboard-wrapper {
            width: 100%;
            max-width: 580px;
            background: var(--grafana-panel);
            border: 1px solid var(--grafana-border);
            border-radius: 4px; /* Grafana uses sharp/clean geometric lines */
            box-shadow: 0 12px 36px rgba(0,0,0,0.6);
        }

        /* Top Control Bar */
        .system-bar {
            background: #181b1f;
            border-bottom: 1px solid var(--grafana-border);
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .system-bar h1 {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--orange-accent);
            font-family: var(--font-mono);
        }

        .latency-indicator {
            font-size: 11px;
            font-family: var(--font-mono);
            color: var(--green-accent);
        }

        .main-content {
            padding: 20px;
        }

        /* Stats Strip */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: var(--grafana-card);
            border-left: 3px solid var(--blue-accent);
            padding: 10px;
            border-radius: 2px;
        }

        .stat-box.alerting { border-left-color: var(--red-accent); }
        .stat-box.healthy { border-left-color: var(--green-accent); }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 600;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            font-family: var(--font-mono);
            margin-top: 4px;
        }

        /* Matrix Heatmap */
        .heatmap-panel {
            background: var(--grafana-card);
            border: 1px solid var(--grafana-border);
            padding: 14px;
            margin-bottom: 20px;
            border-radius: 2px;
        }

        .panel-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-main);
            text-transform: uppercase;
            margin-bottom: 10px;
            font-family: var(--font-mono);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .matrix-grid {
            display: grid;
            grid-template-columns: repeat(14, 1fr);
            gap: 4px;
        }

        .matrix-node {
            height: 12px;
            background: rgba(86, 166, 75, 0.2);
            border: 1px solid rgba(86, 166, 75, 0.4);
            border-radius: 1px;
        }
        .matrix-node.active-pulse {
            background: var(--orange-accent);
            box-shadow: 0 0 8px var(--orange-accent);
            border-color: #fff;
        }

        /* Log Streaming Layout */
        .log-list {
            max-height: 260px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .log-list::-webkit-scrollbar { width: 4px; }
        .log-list::-webkit-scrollbar-thumb { background: var(--grafana-border); }

        .log-card {
            background: #181b1f;
            border: 1px solid var(--grafana-border);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            border-left: 3px solid var(--red-accent);
        }

        .log-row-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .log-title {
            font-size: 13px;
            font-weight: 600;
            font-family: var(--font-mono);
        }

        .log-time {
            font-size: 11px;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        .distance-badge {
            align-self: flex-start;
            font-size: 10px;
            font-family: var(--font-mono);
            padding: 2px 6px;
            background: rgba(87, 148, 242, 0.15);
            color: var(--blue-accent);
            border: 1px solid rgba(87, 148, 242, 0.3);
        }

        /* Action Controls */
        .control-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 20px;
            align-items: center;
        }

        .btn {
            padding: 10px 16px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            font-family: var(--font-mono);
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.15s ease;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--grafana-border);
            color: var(--text-main);
        }
        .btn-secondary:hover {
            background: var(--grafana-card);
            border-color: var(--text-muted);
        }

        .btn-danger {
            background: rgba(242, 73, 92, 0.1);
            border: 1px solid var(--red-accent);
            color: var(--red-accent);
            width: 100%;
        }
        .btn-danger:hover {
            background: var(--red-accent);
            color: #fff;
        }

        /* Auth Screen Design */
        .auth-container {
            padding: 30px;
            max-width: 400px;
            width: 100%;
            background: var(--grafana-panel);
            border: 1px solid var(--grafana-border);
        }

        .input-wrapper {
            margin-bottom: 16px;
        }

        .input-wrapper label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-family: var(--font-mono);
        }

        .input-wrapper input {
            width: 100%;
            padding: 10px;
            background: var(--grafana-bg);
            border: 1px solid var(--grafana-border);
            color: #fff;
            font-size: 13px;
        }
        .input-wrapper input:focus {
            outline: none;
            border-color: var(--orange-accent);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-form" class="auth-container">
        <h1 style="font-size: 14px; color: var(--orange-accent); font-family: var(--font-mono); margin-bottom: 20px; letter-spacing: 1px;">// CONSOLE ACCESS LOCK</h1>
        <div class="input-wrapper">
            <label>Operator Node Email</label>
            <input type="email" id="email" placeholder="your@e-mail.com">
        </div>
        <div class="input-wrapper">
            <label>Cryptographic Phrase</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button id="auth-submit-btn" class="btn btn-secondary" style="width: 100%; border-color: var(--orange-accent); color: var(--orange-accent);">Initialize System Validation</button>
    </div>

    <div id="dashboard" class="dashboard-wrapper hidden">
        <div class="system-bar">
            <h1>📊 TAFTALIDZE HQ // SECURITY METRIC ENGINE</h1>
            <div class="latency-indicator">🌐 Live Sync // 4.2k Link</div>
        </div>

        <div class="main-content">
            <div class="stats-grid">
                <div class="stat-box alerting">
                    <div class="stat-label">Total Alarms</div>
                    <div class="stat-value" style="color: var(--red-accent);" id="total-alarms-count">0</div>
                </div>
<div class="stat-box healthy">
    <div class="stat-label">Uptime Metric</div>
    <div class="stat-value" style="color: var(--green-accent);">99.8%</div>
</div>

<div class="stat-box healthy">
    <div class="stat-label">Uptime Metric</div>
    <div class="stat-value" style="color: var(--green-accent);" id="uptime-metric-value">0.0%</div>
</div>
                <div class="stat-box">
                    <div class="stat-label">Sys Kernel</div>
                    <div class="stat-value" style="color: var(--blue-accent);">v2.6</div>
                </div>
            </div>

            <div class="heatmap-panel">
                <div class="panel-title" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <div><span style="color: var(--orange-accent);">■</span> Spatial Intrusion Density Map</div>
                    <div style="font-size: 9px; color: var(--text-muted);">[0cm ---> 140cm]</div>
                </div>
                <div class="matrix-grid" id="spatial-matrix-grid">
                    <div class="matrix-node"></div><div class="matrix-node"></div><div class="matrix-node"></div>
                    <div class="matrix-node"></div><div class="matrix-node"></div><div class="matrix-node"></div>
                    <div class="matrix-node"></div><div class="matrix-node"></div><div class="matrix-node"></div>
                    <div class="matrix-node"></div><div class="matrix-node"></div><div class="matrix-node"></div>
                    <div class="matrix-node"></div><div class="matrix-node"></div><div class="matrix-node"></div>
                    <div class="matrix-node"></div><div class="matrix-node"></div><div class="matrix-node"></div>
                    <div class="matrix-node"></div><div class="matrix-node"></div><div class="matrix-node"></div>
                    <div class="matrix-node"></div><div class="matrix-node"></div><div class="matrix-node"></div>
                    <div class="matrix-node"></div><div class="matrix-node"></div><div class="matrix-node"></div>
                    <div class="matrix-node"></div>
                </div>
            </div>

            <div class="panel-title" style="margin-left: 4px; display: flex; justify-content: space-between;">
                <span>📋 Live Telemetry Logs</span>
                <button id="audio-toggle-btn" class="btn btn-secondary" style="padding: 2px 8px; font-size: 9px; border-radius: 2px;">
                    🔈 Audio Disabled
                </button>
            </div>
            
            <div id="log-container" class="log-list"></div>

            <div class="control-row">
                <button id="hardware-restart-btn" class="btn btn-danger">
                    Execute Remote Hardware Reset Sequence
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. SUPABASE ACCREDITATION CREDENTIALS ---
        const SUPABASE_PROJECT_ID = "nlnininesnenehyoshjw";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sbmluaW5lc25lbmVoeW9zaGp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NTAwMjUsImV4cCI6MjA5NzQyNjAyNX0.01yLEIL2-IoOV401Tw_7f5jEvoUocTOguQSPYazxVGk";
        
        const _supabase = supabase.createClient(
            `https://${SUPABASE_PROJECT_ID}.supabase.co`, 
            SUPABASE_ANON_KEY
        );

        // --- 2. NATIVE AUDIO SYNTHESIZER ---
        let isAudioMuted = true;

        function playSystemChime() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.type = 'sine'; 
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
                
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.2);

                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.2);
            } catch (e) {
                console.warn("Synth engine busy:", e.message);
            }
        }

        // --- 3. SECURITY AUTHENTICATION HANDLERS ---
        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if(!email || !password) return alert("Please fill credentials.");

            try {
                const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
                if (error) {
                    alert("Authorization Terminated: " + error.message);
                } else {
                    showDashboard();
                }
            } catch(err) {
                alert("Connection handshake failed.");
            }
        }

        function showDashboard() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            fetchLogs();
            subscribeToLiveUpdates();
        }

        // --- 4. DATA RETRIEVAL & RENDERING PIPELINES ---
async function fetchLogs() {
    try {
        // 1. Fetch exact total counts and the 5 latest logs
        const { data: logs, error, count } = await _supabase
            .from('logs')
            .select('*', { count: 'exact' })
            .order('created_at', { ascending: false })
            .limit(5);

        if (error) throw error;
        
        document.getElementById('total-alarms-count').innerText = count !== null ? count : 0;
        renderLogs(logs);

        // 2. Fetch all logs from the past 24 hours to calculate true Uptime
        const oneDayAgo = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
        const { count: dailyLogCount, error: uptimeError } = await _supabase
            .from('logs')
            .select('*', { count: 'exact', head: true })
            .gte('created_at', oneDayAgo);

        if (!uptimeError) {
            calculateRealUptime(dailyLogCount);
        }

    } catch (err) {
        console.error("Error drawing data panel:", err.message);
    }
}

function calculateRealUptime(actualLogsReceived) {
    // ASSUMPTION: If your ESP32 drops a heartbeat/ping log once every 5 minutes, 
    // it should ideally send 288 logs in a 24-hour cycle (12 logs/hour * 24).
    const expectedLogsPerDay = 288; 
    
    if (actualLogsReceived === 0) {
        document.getElementById('uptime-metric-value').innerText = "0.0%";
        return;
    }

    // Calculate ratio
    let uptimePercentage = (actualLogsReceived / expectedLogsPerDay) * 100;
    
    // Cap it at 100% in case extra motion events happen frequently
    if (uptimePercentage > 100) uptimePercentage = 100;
    
    const finalUptimeStr = uptimePercentage.toFixed(1) + "%";
    const uptimeElement = document.getElementById('uptime-metric-value');
    
    uptimeElement.innerText = finalUptimeStr;

    // Dynamically shift color themes if things look bad!
    const parentBox = uptimeElement.closest('.stat-box');
    if (uptimePercentage < 85) {
        parentBox.classList.remove('healthy');
        parentBox.classList.add('alerting');
        uptimeElement.style.color = "var(--red-accent)";
    } else {
        parentBox.classList.remove('alerting');
        parentBox.classList.add('healthy');
        uptimeElement.style.color = "var(--green-accent)";
    }
}

        function renderLogs(logs) {
            const container = document.getElementById('log-container');
            if (!logs || logs.length === 0) {
                container.innerHTML = `<p style="color:var(--text-muted); text-align:center; font-size:12px; font-family:var(--font-mono); margin:30px 0;">NO CONSOLE ALARMS DATA FOUND</p>`;
                return;
            }

            container.innerHTML = logs.map(log => {
                const dateObj = new Date(log.created_at);
                const displayDate = dateObj.toLocaleDateString([], { day: '2-digit', month: '2-digit' });
                const displayTime = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
                
                const distanceValue = log.distance_cm ? `${log.distance_cm} cm` : 'Null Vector';

                return `
                    <div class="log-card">
                        <div class="log-row-top">
                            <div class="log-title">
                                <span style="color:var(--red-accent);">⚠️ INTRUSION EVENT DETECTED</span>
                            </div>
                            <div class="log-time">${displayDate} @ ${displayTime}</div>
                        </div>
                        <div class="distance-badge">
                            📍 proximity_metric: ${distanceValue}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- 5. AUDIO PERSISTENCE CONTROLLERS ---
        function toggleDashboardAudio() {
            const btn = document.getElementById('audio-toggle-btn');
            
            if (isAudioMuted) {
                playSystemChime();
                isAudioMuted = false;
                btn.innerHTML = "🔊 Audio Active";
                btn.style.borderColor = "var(--green-accent)";
                btn.style.color = "var(--green-accent)";
            } else {
                isAudioMuted = true;
                btn.innerHTML = "🔈 Audio Disabled";
                btn.style.borderColor = "var(--grafana-border)";
                btn.style.color = "var(--text-main)";
            }
        }

        // --- 6. REAL-TIME EVENT SYNCHRONIZATION ---
        function getColumnFromDistance(distCm) {
            if (!distCm || isNaN(distCm)) return 0;
            // Matches columns 0 to 13 dynamically based on 10cm steps
            let col = Math.floor(distCm / 10);
            return Math.min(13, col);
        }

        function pulseNodeByDistance(colIndex) {
            const nodes = document.querySelectorAll('.matrix-node');
            
            // Map distance columns to index ranges (0-13 mapping)
            const primaryNode = nodes[colIndex];
            const lowerNode = nodes[colIndex + 14]; // Pulse secondary vertical row elements
            
            if (primaryNode) {
                primaryNode.classList.add('active-pulse');
                setTimeout(() => primaryNode.classList.remove('active-pulse'), 2000);
            }
            if (lowerNode) {
                lowerNode.classList.add('active-pulse');
                setTimeout(() => lowerNode.classList.remove('active-pulse'), 2000);
            }
        }

        function subscribeToLiveUpdates() {
            _supabase
                .channel('schema-db-changes')
                .on(
                    'postgres_changes', 
                    { event: 'INSERT', schema: 'public', table: 'logs' }, 
                    (payload) => {
                        if (!isAudioMuted) playSystemChime();
                        fetchLogs(); 
                        
                        // Parse real-time database payload metrics
                        const targetCol = getColumnFromDistance(payload.new.distance_cm);
                        pulseNodeByDistance(targetCol);
                    }
                )
                .subscribe();
        }

        // --- 7. REMOTE PROTOCOLS ---
        async function triggerRemoteRestart() {
            if (!confirm("Confirm immediate remote firmware hardware execution restart for ESP32?")) return;

            try {
                const { error } = await _supabase
                    .from('commands')
                    .insert([{ command: 'RESTART', processed: false }]);

                if (error) throw error;
                alert("Execution sequence successfully queued into database pipeline.");
            } catch (err) {
                alert("Failed to push instructions line: " + err.message);
            }
        }

        // --- 8. GLOBAL EVENT HOOKS MANAGEMENT ---
        document.addEventListener('DOMContentLoaded', () => {
            // Check for pre-existing verified terminal context sessions
            _supabase.auth.getSession().then(({ data: { session } }) => {
                if (session) showDashboard();
            });

            // Interactive Event Binding
            document.getElementById('auth-submit-btn').addEventListener('click', login);
            document.getElementById('audio-toggle-btn').addEventListener('click', toggleDashboardAudio);
            document.getElementById('hardware-restart-btn').addEventListener('click', triggerRemoteRestart);

            document.getElementById('password').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') login();
            });
        });
    </script>
</body>
</html>
