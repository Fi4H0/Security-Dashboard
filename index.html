<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taftalidze Security Hub - Grafana Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --grafana-bg: #0b0c10;
            --grafana-panel: #141619;
            --grafana-card: #1f2226;
            --grafana-border: #2c323a;
            --text-main: #d8d9da;
            --text-muted: #7b8087;
            --orange-accent: #ff780a;
            --green-accent: #56a64b;
            --blue-accent: #5794f2;
            --red-accent: #f2495c;
            --font-mono: "Fira Code", Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--grafana-bg);
            color: var(--text-main);
            min-height: 100vh;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dashboard-wrapper {
            width: 100%;
            max-width: 580px;
            background: var(--grafana-panel);
            border: 1px solid var(--grafana-border);
            border-radius: 4px;
            box-shadow: 0 12px 36px rgba(0,0,0,0.6);
        }

        .system-bar {
            background: #181b1f;
            border-bottom: 1px solid var(--grafana-border);
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .system-bar h1 {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--orange-accent);
            font-family: var(--font-mono);
        }

        .latency-indicator {
            font-size: 11px;
            font-family: var(--font-mono);
            color: var(--green-accent);
        }

        .main-content {
            padding: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: var(--grafana-card);
            border-left: 3px solid var(--blue-accent);
            padding: 10px;
            border-radius: 2px;
        }

        .stat-box.alerting { border-left-color: var(--red-accent); }
        .stat-box.healthy { border-left-color: var(--green-accent); }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 600;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            font-family: var(--font-mono);
            margin-top: 4px;
        }

        .heatmap-panel {
            background: var(--grafana-card);
            border: 1px solid var(--grafana-border);
            padding: 14px;
            margin-bottom: 20px;
            border-radius: 2px;
        }

        .panel-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-main);
            text-transform: uppercase;
            margin-bottom: 10px;
            font-family: var(--font-mono);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .matrix-grid {
            display: grid;
            grid-template-columns: repeat(14, 1fr);
            gap: 4px;
        }

        .matrix-node {
            height: 12px;
            background: rgba(86, 166, 75, 0.2);
            border: 1px solid rgba(86, 166, 75, 0.4);
            border-radius: 1px;
        }
        .matrix-node.active-pulse {
            background: var(--orange-accent);
            box-shadow: 0 0 8px var(--orange-accent);
            border-color: #fff;
        }

        .log-list {
            max-height: 260px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .log-list::-webkit-scrollbar { width: 4px; }
        .log-list::-webkit-scrollbar-thumb { background: var(--grafana-border); }

        .log-card {
            background: #181b1f;
            border: 1px solid var(--grafana-border);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            border-left: 3px solid var(--red-accent);
        }

        .log-row-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .log-title {
            font-size: 13px;
            font-weight: 600;
            font-family: var(--font-mono);
        }

        .log-time {
            font-size: 11px;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        .distance-badge {
            align-self: flex-start;
            font-size: 10px;
            font-family: var(--font-mono);
            padding: 2px 6px;
            background: rgba(87, 148, 242, 0.15);
            color: var(--blue-accent);
            border: 1px solid rgba(87, 148, 242, 0.3);
        }

        .control-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 20px;
            align-items: center;
        }

        .btn {
            padding: 10px 16px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            font-family: var(--font-mono);
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.15s ease;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--grafana-border);
            color: var(--text-main);
        }
        .btn-secondary:hover {
            background: var(--grafana-card);
            border-color: var(--text-muted);
        }

        .btn-danger {
            background: rgba(242, 73, 92, 0.1);
            border: 1px solid var(--red-accent);
            color: var(--red-accent);
            width: 100%;
        }
        .btn-danger:hover {
            background: var(--red-accent);
            color: #fff;
        }

        .auth-container {
            padding: 30px;
            max-width: 400px;
            width: 100%;
            background: var(--grafana-panel);
            border: 1px solid var(--grafana-border);
        }

        .input-wrapper {
            margin-bottom: 16px;
        }

        .input-wrapper label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-family: var(--font-mono);
        }

        .input-wrapper input {
            width: 100%;
            padding: 10px;
            background: var(--grafana-bg);
            border: 1px solid var(--grafana-border);
            color: #fff;
            font-size: 13px;
        }
        .input-wrapper input:focus {
            outline: none;
            border-color: var(--orange-accent);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-form" class="auth-container">
        <h1 style="font-size: 14px; color: var(--orange-accent); font-family: var(--font-mono); margin-bottom: 20px; letter-spacing: 1px;">// CONSOLE ACCESS LOCK</h1>
        <div class="input-wrapper">
            <label>Operator Node Email</label>
            <input type="email" id="email" placeholder="admin@node.io">
        </div>
        <div class="input-wrapper">
            <label>Cryptographic Phrase</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button class="btn btn-secondary" style="width: 100%; border-color: var(--orange-accent); color: var(--orange-accent);" onclick="login()">Initialize System Validation</button>
    </div>

    <div id="dashboard" class="dashboard-wrapper hidden">
        <div class="system-bar">
            <h1>📊 TAFTALIDZE HQ // SECURITY METRIC ENGINE</h1>
            <div class="latency-indicator">🌐 Live Sync // 4.2k Link</div>
        </div>

        <div class="main-content">
            <div class="stats-grid">
                <div class="stat-box alerting">
                    <div class="stat-label">Total Alarms</div>
                    <div class="stat-value" style="color: var(--red-accent);" id="total-alarms-count">5</div>
                </div>
                <div class="stat-box healthy">
                    <div class="stat-label">Uptime Metric</div>
                    <div class="stat-value" style="color: var(--green-accent);">99.8%</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Sys Kernel</div>
                    <div class="stat-value" style="color: var(--blue-accent);">v2.6</div>
                </div>
            </div>

            <div class="heatmap-panel">
                <div class="panel-title">
                    <span style="color: var(--orange-accent);">■</span> Spatial Intrusion Density Map
                </div>
                <div class="matrix-grid">
                    <div class="matrix-node"></div><div class="matrix-node"></div><div class="matrix-node active-pulse"></div>
                    <div class="matrix-node"></div><div class="matrix-node"></div><div class="matrix-node"></div>
                    <div class="matrix-node"></div><div class="matrix-node active-pulse"></div><div class="matrix-node"></div>
                    <div class="matrix-node"></div><div class="matrix-node"></div><div class="matrix-node"></div>
                    <div class="matrix-node"></div><div class="matrix-node"></div><div class="matrix-node"></div>
                    <div class="matrix-node"></div><div class="matrix-node active-pulse"></div><div class="matrix-node"></div>
                    <div class="matrix-node"></div><div class="matrix-node"></div><div class="matrix-node"></div>
                    <div class="matrix-node"></div><div class="matrix-node"></div><div class="matrix-node"></div>
                    <div class="matrix-node"></div><div class="matrix-node"></div><div class="matrix-node"></div>
                    <div class="matrix-node"></div>
                </div>
            </div>

            <div class="panel-title" style="margin-left: 4px; display: flex; justify-content: space-between;">
                <span>📋 Live Telemetry Logs</span>
                <button id="audio-toggle-btn" class="btn btn-secondary" style="padding: 2px 8px; font-size: 9px; border-radius: 2px;" onclick="toggleDashboardAudio()">
                    🔈 Audio Disabled
                </button>
            </div>
            
            <div id="log-container" class="log-list"></div>

            <div class="control-row">
                <button class="btn btn-danger" onclick="triggerRemoteRestart()">
                    Execute Remote Hardware Reset Sequence
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. GLOBAL SCOPE DECLARATIONS ---
        let isAudioMuted = true;
        let _supabase = null;

        const SUPABASE_PROJECT_ID = "nlnininesnenehyoshjw";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sbmluaW5lc25lbmVoeW9zaGp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NTAwMjUsImV4cCI6MjA5NzQyNjAyNX0.01yLEIL2-IoOV401Tw_7f5jEvoUocTOguQSPYazxVGk";
        
        try {
            if (typeof supabase !== 'undefined') {
                _supabase = supabase.createClient(
                    `https://${SUPABASE_PROJECT_ID}.supabase.co`, 
                    SUPABASE_ANON_KEY
                );
            }
        } catch (e) {
            console.warn("Supabase library initialization skipped/blocked.");
        }

        // --- 2. AUDIO SYNTHESIZER ---
        function playSystemChime() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.type = 'sine'; 
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
                
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.2);

                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.2);
            } catch (e) {
                console.warn("Synth engine busy:", e.message);
            }
        }

        // --- 3. SECURITY AUTHENTICATION HANDLERS ---
        async function login() {
            if (!_supabase) {
                alert("Network Warning: Supabase client unavailable. Check connection/CDN access.");
                return;
            }
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if(!email || !password) return alert("Please fill credentials.");

            try {
                const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
                if (error) {
                    alert("Authorization Terminated: " + error.message);
                } else {
                    showDashboard();
                }
            } catch(err) {
                alert("Connection handshake failed: " + err.message);
            }
        }

        document.getElementById("password").addEventListener("keydown", function(e) {
            if (e.key === "Enter") login();
        });

        function showDashboard() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            fetchLogs();
            subscribeToLiveUpdates();
        }

        // --- 4. DATA RETRIEVAL & RENDERING ---
        async function fetchLogs() {
            if (!_supabase) return;
            try {
                const { data: logs, error } = await _supabase
                    .from('logs')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(5);

                if (error) throw error;
                document.getElementById('total-alarms-count').innerText = logs.length;
                renderLogs(logs);
            } catch (err) {
                console.error("Error drawing data panel:", err.message);
            }
        }

        function renderLogs(logs) {
            const container = document.getElementById('log-container');
            if (!logs || logs.length === 0) {
                container.innerHTML = `<p style="color:var(--text-muted); text-align:center; font-size:12px; font-family:var(--font-mono); margin:30px 0;">NO CONSOLE ALARMS DATA FOUND</p>`;
                return;
            }

            container.innerHTML = logs.map(log => {
                const dateObj = new Date(log.created_at);
                const displayDate = dateObj.toLocaleDateString([], { day: '2-digit', month: '2-digit' });
                const displayTime = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
                const distanceValue = log.distance_cm ? `${log.distance_cm} cm` : 'Null Vector';

                return `
                    <div class="log-card">
                        <div class="log-row-top">
                            <div class="log-title">
                                <span style="color:var(--red-accent);">⚠️ INTRUSION EVENT DETECTED</span>
                            </div>
                            <div class="log-time">${displayDate} @ ${displayTime}</div>
                        </div>
                        <div class="distance-badge">
                            📍 proximity_metric: ${distanceValue}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- 5. AUDIO PERSISTENCE ---
        function toggleDashboardAudio() {
            const btn = document.getElementById('audio-toggle-btn');
            if (isAudioMuted) {
                playSystemChime();
                isAudioMuted = false;
                btn.innerHTML = "🔊 Audio Active";
                btn.style.borderColor = "var(--green-accent)";
                btn.style.color = "var(--green-accent)";
            } else {
                isAudioMuted = true;
                btn.innerHTML = "🔈 Audio Disabled";
                btn.style.borderColor = "var(--grafana-border)";
                btn.style.color = "var(--text-main)";
            }
        }

        // --- 6. REAL-TIME EVENT SYNCHRONIZATION ---
        function subscribeToLiveUpdates() {
            if (!_supabase) return;
            _supabase
                .channel('schema-db-changes')
                .on(
                    'postgres_changes', 
                    { event: 'INSERT', schema: 'public', table: 'logs' }, 
                    (payload) => {
                        if (!isAudioMuted) playSystemChime();
                        fetchLogs(); 
                        const nodes = document.querySelectorAll('.matrix-node');
                        const randomNode = nodes[Math.floor(Math.random() * nodes.length)];
                        randomNode.classList.add('active-pulse');
                        setTimeout(() => randomNode.classList.remove('active-pulse'), 2000);
                    }
                )
                .subscribe();
        }

        // --- 7. REMOTE PROTOCOLS ---
        async function triggerRemoteRestart() {
            if (!_supabase) return alert("Supabase disconnected.");
            if (!confirm("Confirm immediate remote firmware hardware execution restart for ESP32?")) return;

            try {
                const { error } = await _supabase
                    .from('commands')
                    .insert([{ command: 'RESTART', processed: false }]);

                if (error) throw error;
                alert("Execution sequence successfully queued into database pipeline.");
            } catch (err) {
                alert("Failed to push instructions line: " + err.message);
            }
        }
    </script>
</body>
</html>
