<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taftalidze Spatial Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --grafana-bg: #0b0c10;
            --grafana-panel: #141619;
            --grafana-border: #2c323a;
            --text-main: #d8d9da;
            --red-accent: #f2495c;
            --blue-accent: #5794f2;
            --orange-accent: #ff780a;
            --font-mono: "Fira Code", monospace;
        }

        body { background-color: var(--grafana-bg); color: var(--text-main); font-family: sans-serif; padding: 20px; display: flex; justify-content: center; }
        .dashboard-wrapper { width: 100%; max-width: 580px; background: var(--grafana-panel); border: 1px solid var(--grafana-border); border-radius: 2px; }
        
        /* Distance Matrix Styles */
        .heatmap-panel { padding: 20px; }
        .matrix-grid { display: grid; grid-template-columns: repeat(14, 1fr); gap: 4px; }
        .matrix-node { height: 16px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--grafana-border); transition: all 0.3s ease; }
        .active-pulse { background: var(--orange-accent); box-shadow: 0 0 12px var(--orange-accent); border-color: #fff; }
        
        .log-list { max-height: 200px; overflow-y: auto; padding: 20px; }
        .log-card { background: #181b1f; border-left: 3px solid var(--red-accent); padding: 10px; margin-bottom: 8px; font-family: var(--font-mono); font-size: 12px; }
        .hidden { display: none !important; }
        .btn { padding: 10px; border: none; cursor: pointer; font-weight: bold; }
        .btn-danger { background: var(--red-accent); color: white; width: 100%; }
    </style>
</head>
<body>

    <div id="login-form" class="dashboard-wrapper" style="padding: 30px;">
        <h2>AUTH // CONSOLE</h2>
        <input type="email" id="email" placeholder="Email" style="width:100%; margin:10px 0; padding:8px;">
        <input type="password" id="password" placeholder="Password" style="width:100%; margin:10px 0; padding:8px;">
        <button class="btn btn-danger" id="login-btn">Initialize</button>
    </div>

    <div id="dashboard" class="dashboard-wrapper hidden">
        <div style="padding: 15px; border-bottom: 1px solid var(--grafana-border);">
            <h1>📡 SPATIAL TELEMETRY FEED</h1>
        </div>

        <div class="heatmap-panel">
            <div style="font-size:10px; margin-bottom:10px; color:var(--blue-accent);">[ 0cm &lt;--- DISTANCE RANGE ---&gt; 140cm ]</div>
            <div class="matrix-grid" id="matrix">
                </div>
        </div>

        <div id="log-container" class="log-list"></div>
        <button class="btn btn-danger" id="reset-btn">REMOTE HARDWARE RESET</button>
    </div>

    <script>
        const _supabase = supabase.createClient("https://nlnininesnenehyoshjw.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sbmluaW5lc25lbmVoeW9zaGp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NTAwMjUsImV4cCI6MjA5NzQyNjAyNX0.01yLEIL2-IoOV401Tw_7f5jEvoUocTOguQSPYazxVGk");

        // Generate 14 nodes for the heatmap
        const matrix = document.getElementById('matrix');
        for(let i=0; i<14; i++) matrix.innerHTML += `<div class="matrix-node" data-col="${i}"></div>`;

        // Logic
        async function login() {
            const { error } = await _supabase.auth.signInWithPassword({ 
                email: document.getElementById('email').value, 
                password: document.getElementById('password').value 
            });
            if (!error) {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                subscribe();
            } else alert(error.message);
        }

        function getColumnFromDistance(distCm) {
            if (!distCm) return 0;
            return Math.min(13, Math.floor(distCm / 10));
        }

        function subscribe() {
            _supabase.channel('logs').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'logs' }, (payload) => {
                const col = getColumnFromDistance(payload.new.distance_cm);
                const nodes = document.querySelectorAll('.matrix-node');
                
                // Pulse the node
                nodes[col].classList.add('active-pulse');
                setTimeout(() => nodes[col].classList.remove('active-pulse'), 2000);
                
                // Refresh log list
                fetchLogs();
            }).subscribe();
        }

        async function fetchLogs() {
            const { data } = await _supabase.from('logs').select('*').order('created_at', { ascending: false }).limit(5);
            document.getElementById('log-container').innerHTML = data.map(l => `
                <div class="log-card">
                    ⚠️ Motion at ${l.distance_cm || 0}cm - ${new Date(l.created_at).toLocaleTimeString()}
                </div>
            `).join('');
        }

        async function triggerRemoteRestart() {
            await _supabase.from('commands').insert([{ command: 'RESTART', processed: false }]);
            alert("Reset signal sent.");
        }

        document.getElementById('login-btn').addEventListener('click', login);
        document.getElementById('reset-btn').addEventListener('click', triggerRemoteRestart);
    </script>
</body>
</html>
